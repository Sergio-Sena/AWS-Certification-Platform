name: Deploy to AWS (CDN Unificado)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  PROJECT_PREFIX: aws-cert

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate certification pages
      run: |
        echo "🔍 Validating..."
        for cert in clf-c02 dva-c02 saa-c03 dop-c02 aif-c01; do
          if [ -f "public/$cert/index.html" ]; then
            echo "✅ $cert OK"
          else
            echo "⚠️ $cert missing (non-blocking)"
          fi
        done

    - name: Check 80% score criteria
      run: |
        if grep -r "80" --include="*.js" public/ | grep -q "80"; then
          echo "✅ 80% pass score configured"
        else
          echo "❌ 80% pass score not found"
          exit 1
        fi

    - name: Check for exposed credentials
      run: |
        if grep -rn "AKIA\|aws_secret\|password\s*=" --include="*.js" --include="*.html" public/; then
          echo "❌ Credentials found!"
          exit 1
        else
          echo "✅ No credentials exposed"
        fi

  ai-audit:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install boto3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Run AI Audit (5 agents)
      run: python scripts/agents/ai-audit.py

  deploy-frontend:
    needs: [test, ai-audit]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Verify AWS connection
      run: |
        echo "🔐 Verifying AWS credentials..."
        aws sts get-caller-identity
        echo "✅ Authenticated"

    - name: Sync to S3 (prefix aws-cert/)
      run: |
        echo "📦 Syncing public/ → s3://sstech-cdn-unified/aws-cert/"
        aws s3 sync public/ s3://${{ secrets.S3_BUCKET_FRONTEND }}/aws-cert/ \
          --delete \
          --cache-control "public, max-age=86400" \
          --exclude "*.map"
        echo "✅ S3 sync complete (prefix: aws-cert/)"

    - name: Set short cache for HTML files
      run: |
        aws s3 cp s3://${{ secrets.S3_BUCKET_FRONTEND }}/aws-cert/ \
          s3://${{ secrets.S3_BUCKET_FRONTEND }}/aws-cert/ \
          --recursive \
          --exclude "*" \
          --include "*.html" \
          --cache-control "public, max-age=300" \
          --content-type "text/html" \
          --metadata-directive REPLACE

    - name: Invalidate CloudFront (prefix only)
      run: |
        echo "🌐 Invalidating /aws-cert/*..."
        aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/aws-cert/*"
        echo "✅ Cache invalidated for /aws-cert/ only"

  health-check:
    needs: deploy-frontend
    runs-on: ubuntu-latest
    steps:
    - name: Wait for propagation
      run: sleep 15

    - name: Check site availability
      run: |
        echo "🏥 Health check..."
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://sstech.cloud/aws-cert/" || echo "000")
        if [ "$STATUS" = "200" ]; then
          echo "✅ Site responding (HTTP $STATUS)"
        else
          echo "⚠️ Site returned HTTP $STATUS (CDN may still be propagating)"
        fi

  finops:
    needs: deploy-frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install boto3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Run FinOps Cost Report
      run: python scripts/finops/cost-report.py

  notify:
    needs: [deploy-frontend, health-check, finops]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Deploy summary
      run: |
        echo "========================================="
        echo "🚀 AWS Certification Platform - Deploy"
        echo "📦 Bucket: sstech-cdn-unified/aws-cert/"
        echo "🌐 CDN: E9ZQJ3RPSA04N"
        echo "🔗 URL: https://sstech.cloud/aws-cert/"
        echo "🤖 AI Audit: completed"
        echo "💰 FinOps: report sent"
        echo "========================================="
