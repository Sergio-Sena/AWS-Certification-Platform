name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate before deploy
      run: |
        echo "🔍 Pre-deploy validation..."
        for cert in clf-c02 dva-c02 saa-c03 dop-c02 aif-c01; do
          if [ -f "public/$cert/index.html" ]; then
            echo "✅ $cert OK"
          else
            echo "⚠️ $cert page missing (non-blocking)"
          fi
        done

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './public'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: Deploy summary
      run: |
        echo "🚀 Deploy completed!"
        echo "🌐 URL: https://sergio-sena.github.io/AWS-Certification-Platform/"
